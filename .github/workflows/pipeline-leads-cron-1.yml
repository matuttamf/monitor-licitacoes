name: Pipeline Leads Cron 1 (arquivo 0, 12h)

# Horários BRT (UTC-3): 21h e 9h
on:
  schedule:
    - cron: '0 0,12 * * *'   # 0h e 12h UTC = 21h e 9h BRT
  workflow_dispatch: {}

jobs:
  coletar:
    name: Coletar leads arquivo 0
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - name: Coletar arquivo 0
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_OPTIONS: --max-old-space-size=6144
          MAX_ROWS: '0'
        run: npx tsx scripts/coletar-leads-rfb.ts 0 0
      - name: Notificar conclusão
        if: always()
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx scripts/notificar-cron.ts "pipeline-cron1-coleta" "${{ job.status }}"

  emails-rfb:
    name: Enriquecer e-mails arquivo 0
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: coletar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - name: Enriquecer e-mails arquivo 0
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_OPTIONS: --max-old-space-size=6144
          MAX_ROWS: '0'
        run: npx tsx scripts/enriquecer-emails-rfb.ts 0 0
      - name: Notificar conclusão
        if: always()
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx scripts/notificar-cron.ts "pipeline-cron1-emails" "${{ job.status }}"

  receita:
    name: Enriquecer via Receita Federal
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: emails-rfb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - name: Enriquecer CNPJs via Receita Federal
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAX_ROWS: '0'
        run: npx tsx scripts/enriquecer-receita.ts
      - name: Notificar conclusão
        if: always()
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx scripts/notificar-cron.ts "pipeline-cron1-receita" "${{ job.status }}"

  bulk-enrich-rfb:
    name: Bulk enrichment RFB (arquivo 0)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: emails-rfb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - name: Bulk enrichment via arquivos RFB
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_OPTIONS: --max-old-space-size=6144
          MAX_ROWS: '0'
        run: npx tsx scripts/enriquecer-bulk-rfb.ts 0 0
      - name: Notificar conclusão
        if: always()
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx scripts/notificar-cron.ts "pipeline-cron1-bulk" "${{ job.status }}"
