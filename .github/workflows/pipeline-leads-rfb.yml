name: Pipeline Leads RFB (Completo)

on:
  workflow_dispatch:
    inputs:
      ano:
        description: 'Ano dos dados (ex: 2026). Vazio = mês anterior'
        default: ''
      mes:
        description: 'Mês dos dados (ex: 5). Vazio = mês anterior'
        default: ''

jobs:
  arquivo-0:
    name: 'Fase 1/10 — Coleta arquivo 0'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - name: Coletar arquivo 0
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          ANO="${{ github.event.inputs.ano }}"
          MES="${{ github.event.inputs.mes }}"
          if [ -n "$ANO" ] && [ -n "$MES" ]; then
            npx tsx scripts/coletar-leads-rfb.ts 0 0 "$ANO" "$MES"
          else
            npx tsx scripts/coletar-leads-rfb.ts 0 0
          fi

  arquivo-1:
    name: 'Fase 2/10 — Coleta arquivo 1'
