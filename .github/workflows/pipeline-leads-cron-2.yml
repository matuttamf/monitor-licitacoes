name: Pipeline Leads Cron 2 (arquivos 1-9, 12h)

# Horários BRT (UTC-3): 3h e 15h (offset 6h em relação ao cron 1)
on:
  schedule:
    - cron: '0 6,18 * * *'   # 6h e 18h UTC = 3h e 15h BRT
  workflow_dispatch: {}

jobs:
  coletar:
    name: Coletar leads arquivos 1-9
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - name: Coletar arquivos 1-9
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_OPTIONS: --max-old-space-size=6144
          MAX_ROWS: '0'
        run: npx tsx scripts/coletar-leads-rfb.ts 1 9
      - name: Notificar conclusão
        if: always()
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx scripts/notificar-cron.ts "pipeline-cron2-coleta" "${{ job.status }}"

  preparar-cache:
    name: Preparar cache CNPJs sem e-mail
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: coletar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - name: Exportar CNPJs sem e-mail para Storage
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_OPTIONS: --max-old-space-size=6144
          MAX_ROWS: '0'
        run: npx tsx scripts/enriquecer-emails-rfb.ts --prepare

  emails-rfb:
    name: Enriquecer e-mails arquivos 1-9
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: preparar-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - name: Enriquecer e-mails arquivos 1-9 via cache
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_OPTIONS: --max-old-space-size=6144
          MAX_ROWS: '0'
        run: npx tsx scripts/enriquecer-emails-rfb.ts 1 9 --from-cache
      - name: Notificar conclusão
        if: always()
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx scripts/notificar-cron.ts "pipeline-cron2-emails" "${{ job.status }}"

  receita:
    name: Enriquecer via Receita Federal
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: emails-rfb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - name: Enriquecer CNPJs via Receita Federal
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAX_ROWS: '0'
        run: npx tsx scripts/enriquecer-receita.ts
      - name: Notificar conclusão
        if: always()
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx scripts/notificar-cron.ts "pipeline-cron2-receita" "${{ job.status }}"
