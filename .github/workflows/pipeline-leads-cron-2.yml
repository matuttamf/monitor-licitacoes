name: Pipeline Leads Cron 2 (arquivos 1-5, 12h)

# Horários BRT (UTC-3): 3h e 15h (offset 6h em relação ao cron 1)
on:
  schedule:
    - cron: '0 2 2,5,8,11,14,17,20,23,26,29 * *'   # 23h BRT dias 2,5,8... (ciclo 3 dias)
  workflow_dispatch: {}

jobs:
  coletar:
    name: Coletar leads arquivos 1-5
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - name: Coletar arquivos 1-9
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_OPTIONS: --max-old-space-size=6144
          MAX_ROWS: '0'
        run: npx tsx scripts/coletar-leads-rfb.ts 1 5
      - name: Notificar conclusão
        if: always()
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx scripts/notificar-cron.ts "pipeline-cron2-coleta" "${{ job.status }}"

  emails-rfb:
    name: Enriquecer e-mails arquivos 1-5
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: coletar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - name: Enriquecer e-mails arquivos 1-5
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_OPTIONS: --max-old-space-size=6144
          MAX_ROWS: '0'
        run: npx tsx scripts/enriquecer-emails-rfb.ts 1 5
      - name: Notificar conclusão
        if: always()
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx scripts/notificar-cron.ts "pipeline-cron2-emails" "${{ job.status }}"

  receita:
    name: Enriquecer via Receita Federal
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: emails-rfb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - name: Enriquecer CNPJs via Receita Federal
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAX_ROWS: '0'
        run: npx tsx scripts/enriquecer-receita.ts
      - name: Notificar conclusão
        if: always()
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx scripts/notificar-cron.ts "pipeline-cron2-receita" "${{ job.status }}"

  bulk-enrich-rfb:
    name: Bulk enrichment RFB (arquivos 1-5)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: emails-rfb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - name: Bulk enrichment via arquivos RFB
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_OPTIONS: --max-old-space-size=6144
          MAX_ROWS: '0'
        run: npx tsx scripts/enriquecer-bulk-rfb.ts 1 5
      - name: Notificar conclusão
        if: always()
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx scripts/notificar-cron.ts "pipeline-cron2-bulk" "${{ job.status }}"
