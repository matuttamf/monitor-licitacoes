name: Pipeline Leads RFB (Completo)

on:
  workflow_dispatch:
    inputs:
      ano:
        description: 'Ano dos dados (ex: 2026). Vazio = mês anterior'
        default: ''
      mes:
        description: 'Mês dos dados (ex: 5). Vazio = mês anterior'
        default: ''
      fase_inicio:
        description: 'Fase inicial (1–22). 1=coleta arq0 … 10=coleta arq9 | 11=preparar cache | 12=emails arq0 … 21=emails arq9 | 22=enriquecer Receita'
        default: '1'

jobs:
  arquivo-0:
    name: 'Fase 1/22 — Coleta arquivo 0'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: fromJSON(github.event.inputs.fase_inicio || '1') <= 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - name: Coletar arquivo 0
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_OPTIONS: --max-old-space-size=6144
          MAX_ROWS: '100000'
        run: |
          ANO="${{ github.event.inputs.ano }}"
          MES="${{ github.event.inputs.mes }}"
          if [ -n "$ANO" ] && [ -n "$MES" ]; then
            npx tsx scripts/coletar-leads-rfb.ts 0 0 "$ANO" "$MES"
          else
            npx tsx scripts/coletar-leads-rfb.ts 0 0
          fi

  arquivo-1:
    name: 'Fase 2/22 — Coleta arquivo 1'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: arquivo-0
    if: always() && (needs.arquivo-0.result == 'success' || needs.arquivo-0.result == 'skipped') && fromJSON(github.event.inputs.fase_inicio || '1') <= 2
