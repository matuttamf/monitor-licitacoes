name: Coleta Leads RFB

on:
  workflow_dispatch:
    inputs:
      idx_start:
        description: 'Ãndice inicial (0-9)'
        default: '0'
      idx_end:
        description: 'Ãndice final (0-9)'
        default: '9'
      ano:
        description: 'Ano dos dados (ex: 2026). Vazio = mÃªs anterior'
        default: ''
      mes:
        description: 'MÃªs dos dados (ex: 5). Vazio = mÃªs anterior'
        default: ''

jobs:
  coletar:
    name: Coletar leads arquivos ${{ github.event.inputs.idx_start }}-${{ github.event.inputs.idx_end }}
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependÃªncias
        run: npm ci

      - name: Coletar leads via arquivos RFB
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          IDX_START="${{ github.event.inputs.idx_start || '0' }}"
          IDX_END="${{ github.event.inputs.idx_end || '9' }}"
          ANO="${{ github.event.inputs.ano }}"
          MES="${{ github.event.inputs.mes }}"
          if [ -n "$ANO" ] && [ -n "$MES" ]; then
            npx tsx scripts/coletar-leads-rfb.ts "$IDX_START" "$IDX_END" "$ANO" "$MES"
          else
            npx tsx scripts/coletar-leads-rfb.ts "$IDX_START" "$IDX_END"
          fi

      - name: Enriquecer via Receita Federal
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAX_ROWS: '200000'
        run: npx tsx scripts/enriquecer-receita.ts

      - name: Notificar conclusÃ£o
        if: always()
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx scripts/notificar-cron.ts "coleta-leads-rfb" "${{ job.status }}"

