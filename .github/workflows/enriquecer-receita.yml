name: Enriquecer Receita Federal

on:
  schedule:
    - cron: '0 4 * * *'  # 1h BRT (UTC-3) = 4h UTC
  workflow_dispatch:

jobs:
  enriquecer:
    name: Enriquecer CNPJs via minhareceita.org
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Testar conectividade Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          HOST=$(echo "$NEXT_PUBLIC_SUPABASE_URL" | sed 's|https\?://||' | sed 's|/.*||' | tr -d '[:space:]')
          echo "Hostname extraído: [$HOST]"
          echo "Comprimento: ${#HOST}"
          nslookup "$HOST" || echo "nslookup falhou"
          curl -sI "https://$HOST/rest/v1/" | head -5 || echo "curl falhou"

      - name: Enriquecer CNPJs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/enriquecer-receita.ts
