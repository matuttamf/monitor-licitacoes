name: Enriquecer E-mails RFB

on:
  # Roda no dia 2 de cada mês (após coleta do dia 1)
  schedule:
    - cron: '0 6 2 * *'
  workflow_dispatch:
    inputs:
      idx_start:
        description: 'Índice inicial (0-9)'
        default: '0'
      idx_end:
        description: 'Índice final (0-9)'
        default: '9'

jobs:
  enriquecer:
    name: Enriquecer e-mails de leads existentes
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Enriquecer e-mails
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          IDX_START="${{ github.event.inputs.idx_start || '0' }}"
          IDX_END="${{ github.event.inputs.idx_end || '9' }}"
          npx tsx scripts/enriquecer-emails-rfb.ts "$IDX_START" "$IDX_END"

      - name: Notificar conclusão
        if: always()
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx scripts/notificar-cron.ts "enriquecer-emails-rfb" "${{ job.status }}"
