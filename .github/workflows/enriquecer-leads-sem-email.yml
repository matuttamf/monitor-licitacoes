name: Enriquecer Leads (sem e-mail RFB)

on:
  workflow_dispatch:
    inputs:
      idx_start:
        description: 'Índice inicial arquivos RFB (0-9)'
        default: '0'
      idx_end:
        description: 'Índice final arquivos RFB (0-9)'
        default: '9'
      run_bulk:
        description: 'Rodar bulk enrichment RFB (true/false)'
        default: 'false'

jobs:
  dados-receita:
    name: Enriquecer razão social e situação via Receita
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Enriquecer CNPJs via Receita Federal
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAX_ROWS: '0'
        run: npx tsx scripts/enriquecer-receita.ts

      - name: Notificar conclusão
        if: always()
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx scripts/notificar-cron.ts "enriquecer-receita" "${{ job.status }}"

  bulk-enrich-rfb:
    name: Enriquecer toda a base via arquivos RFB
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: dados-receita
    if: needs.dados-receita.result == 'success' && github.event.inputs.run_bulk == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Bulk enrichment via arquivos RFB
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_OPTIONS: --max-old-space-size=6144
          MAX_ROWS: '0'
        run: |
          IDX_START="${{ github.event.inputs.idx_start || '0' }}"
          IDX_END="${{ github.event.inputs.idx_end || '9' }}"
          npx tsx scripts/enriquecer-bulk-rfb.ts "$IDX_START" "$IDX_END"

      - name: Notificar conclusão
        if: always()
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx scripts/notificar-cron.ts "enriquecer-bulk-rfb" "${{ job.status }}"
